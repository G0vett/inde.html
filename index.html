<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS Gabungan: Warna & Struktur */
        body { 
            background-color: #0b0e11; 
            color: #ffffff; 
            padding-top: 20px;
        }
        .wadah-utama {
            max-width: 600px;
            margin: auto;
            padding: 15px;
        }
        .card-custom { 
            background: #1c1f26; 
            border: 1px solid #2d323e; 
            border-radius: 12px; 
            margin-bottom: 20px;
            padding: 20px;
        }
        .produk-item {
            background: #252932;
            border: 1px solid #2d323e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .produk-item:hover {
            border-color: #3b82f6;
            background: #2d333d;
        }
        .nav-pills .nav-link { 
            color: #94a3b8; 
            background: #1c1f26; 
            border: 1px solid #2d323e;
            margin-right: 8px;
        }
        .nav-pills .nav-link.active { 
            background-color: #3b82f6 !important; 
        }
        .harga { color: #60a5fa; font-weight: bold; display: block; }
        .form-control { background: #0b0e11; border: 1px solid #2d323e; color: white; }
    </style>
</head>
<body>

<div class="wadah-utama">
    <h3 class="mb-4 text-center">💎 ZYOU TOP UP</h3>

    <div class="card-custom">
        <h6 class="mb-3">1. Masukkan User ID</h6>
        <div class="row g-2">
            <div class="col-8">
                <input type="number" class="form-control" placeholder="Masukkan ID">
            </div>
            <div class="col-4">
                <input type="number" class="form-control" placeholder="(Server)">
            </div>
        </div>
    </div>

    <h6 class="mb-3">2. Pilih Nominal</h6>
    <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#ml">Mobile Legends</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#ff">Free Fire</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="ml">
            <div class="row g-2">
                <div class="col-6">
                    <div class="produk-item">
                        <small>86 Diamonds</small>
                        <span class="harga">Rp 20.000</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="produk-item">
                        <small>172 Diamonds</small>
                        <span class="harga">Rp 40.000</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="tab-pane fade" id="ff">
            <div class="row g-2">
                <div class="col-6">
                    <div class="produk-item">
                        <small>70 Diamonds</small>
                        <span class="harga">Rp 10.000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn btn-primary w-100 btn-lg mt-4" onclick="alert('Pesanan diproses!')">Beli Sekarang</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
